services:
    garmin-bridge:
        build:
            context: ./
            dockerfile: garmin-bridge/Dockerfile
        container_name: 'statistics-for-strava-garmin-bridge'
        restart: unless-stopped
        volumes:
            - './garmin-bridge/config:/config'
            - './garmin-bridge/polyline_cache:/config/polyline_cache'
        environment:
            - GARMIN_CONFIG_DIR=/config
            - GARMIN_CACHE_TTL=600
        networks:
            - statistics-for-strava-network
    php-cli:
        build:
            context: ./
            dockerfile: docker/php-cli/Dockerfile
        container_name: 'statistics-for-strava-php-cli'
        volumes:
            - './:/var/www/'
        working_dir: /var/www
        env_file:
            - path: ./.env
              required: true
            - path: ./.env.local
              required: false
        environment:
            - PHP_IDE_CONFIG=phpstorm
            - TZ=Europe/Brussels
        profiles: [on-demand]
        networks:
            - statistics-for-strava-network
    app:
        build:
            context: ./
            dockerfile: docker/app/Dockerfile
        container_name: 'statistics-for-strava-app'
        volumes:
            - ./config/app:/var/www/config/app
            - ./build:/var/www/build
            - ./storage/database:/var/www/storage/database
            - ./storage/files:/var/www/storage/files
            - ./storage/gear-maintenance:/var/www/storage/gear-maintenance
            - ./watch:/var/www/watch
        env_file: '.env.local'
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:2019/metrics"]
          start_period: 60s
        environment:
          - TZ=Europe/Brussels
          - GARMIN_BRIDGE_BASE_URI=http://garmin-bridge:5000/
        ports:
            - '8081:8080'
        networks:
            - statistics-for-strava-network
    daemon:
      build:
        context: ./
        dockerfile: docker/app/Dockerfile
      container_name: 'statistics-for-strava-daemon'
      restart: unless-stopped
      volumes:
        - ./config/app:/var/www/config/app
        - ./build:/var/www/build
        - ./storage/database:/var/www/storage/database
        - ./storage/files:/var/www/storage/files
        - ./storage/gear-maintenance:/var/www/storage/gear-maintenance
        - ./watch:/var/www/watch
      env_file: ".env.local"
      healthcheck:
        test: [ "CMD", "sh", "-c", "test -f /var/www/storage/database/dreeve.db && echo 'ok' || exit 1" ]
        start_period: 5s
      environment:
        - TZ=Europe/Brussels
        - GARMIN_BRIDGE_BASE_URI=http://garmin-bridge:5000/
      command: ['bin/console', 'app:daemon:run']
      networks:
        - statistics-for-strava-network

